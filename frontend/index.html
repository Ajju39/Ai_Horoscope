<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Horoscope App</title>
</head>
<body style="font-family: Arial; padding: 40px;">

  <h1>AI Horoscope App (Auth Test)</h1>

  <h2>Account</h2>

  <label>Email</label><br/>
  <input type="email" id="authEmail" placeholder="Enter email"><br/><br/>

  <label>Password</label><br/>
  <input type="password" id="authPassword" placeholder="Enter password"><br/><br/>

  <button id="signupBtn">Sign Up</button>
  <button id="loginBtn">Login</button>
  <button id="logoutBtn">Logout</button>

  <p id="authStatus" style="margin-top:20px; color:blue;"></p>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    document.getElementById("authStatus").textContent = "INLINE SCRIPT LOADED";

    const SUPABASE_URL = "https://jubjcswqdpuoebharyyk.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1Ympjc3dxZHB1b2ViaGFyeXlrIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NjM1MjcxMSwiZXhwIjoyMDkxOTI4NzExfQ._2X9KrKcXXKY7lEPOzZXm4A7b2aFyaEutsIRce7KZs8";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    console.log("Supabase initialized");

    document.getElementById("signupBtn").onclick = async () => {
      alert("Signup clicked");

      const email = document.getElementById("authEmail").value.trim();
      const password = document.getElementById("authPassword").value.trim();

      const { error } = await supabaseClient.auth.signUp({ email, password });

      document.getElementById("authStatus").textContent =
        error ? error.message : "Signup success!";
    };

    document.getElementById("loginBtn").onclick = async () => {
      alert("Login clicked");

      const email = document.getElementById("authEmail").value.trim();
      const password = document.getElementById("authPassword").value.trim();

      alert("Calling Supabase...");

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      alert("Returned from Supabase");

      document.getElementById("authStatus").textContent =
        error ? error.message : `Logged in as ${data.user.email}`;
    };

    document.getElementById("logoutBtn").onclick = async () => {
      await supabaseClient.auth.signOut();
      document.getElementById("authStatus").textContent = "Logged out";
    };
  </script>

</body>
</html>
